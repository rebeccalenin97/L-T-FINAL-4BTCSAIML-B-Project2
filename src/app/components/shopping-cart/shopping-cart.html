<h2>Shopping Cart</h2>

<table border="1">

<tr>
 <th>Product</th>
 <th>Price</th>
 <th>Quantity</th>
 <th>Action</th>
</tr>

<tr *ngFor="let item of items; let i=index">

 <td>{{item.product.name}}</td>
 <td>{{item.product.price}}</td>
 <td>{{item.quantity}}</td>

 <td>
  <button (click)="remove(i)">Remove</button>
 </td>

</tr>

</table>

<br>

<a routerLink="/">⬅ Back to Products</a>
